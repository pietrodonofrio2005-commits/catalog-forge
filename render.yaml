services:
  # ---- Backend: FastAPI ----
  - type: web
    name: catalog-forge-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false          # incolla qui la connection string di MongoDB Atlas
      - key: DB_NAME
        value: catalog_forge
      - key: JWT_SECRET
        generateValue: true  # Render genera automaticamente un valore sicuro
      - key: EMERGENT_LLM_KEY
        sync: false          # la tua chiave Emergent, per lo storage immagini
      - key: ADMIN_EMAIL
        value: admin@catalog.com
      - key: ADMIN_PASSWORD
        sync: false          # scegli una password admin
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: FRONTEND_URL
        fromService:
          type: web
          name: catalog-forge-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # ---- Frontend: React (static site) ----
  - type: web
    name: catalog-forge-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          type: web
          name: catalog-forge-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
